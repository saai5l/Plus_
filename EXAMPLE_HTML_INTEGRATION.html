<!-- 
  مثال HTML لإضافة الأنظمة المتقدمة
  أضف هذا في قسم admin-dashboard من index.html
-->

<!-- admin-dashboard -->
<div class="page" id="admin-dashboard">

  <!-- Hero Section -->
  <div class="laws-hero">
    <div class="laws-hero-bg"></div>
    <div class="laws-hero-inner">
      <div class="laws-hero-icon"><i class="fas fa-user-shield"></i></div>
      <h1 class="laws-hero-title">لوحة الإدارة المتقدمة</h1>
      <p class="laws-hero-sub">إدارة متكاملة للأدمنز والتحليلات والمحتوى</p>
      <div class="tut-stats-row">
        <div class="tut-stat">
          <i class="fas fa-users"></i>
          <span>إدارة الأدمنز</span>
        </div>
        <div class="tut-stat">
          <i class="fas fa-chart-line"></i>
          <span>التحليلات</span>
        </div>
        <div class="tut-stat">
          <i class="fas fa-file-alt"></i>
          <span>إدارة المحتوى</span>
        </div>
      </div>
    </div>
  </div>

  <div class="adm-container" style="padding: 32px 24px;">

    <!-- TAB NAVIGATION -->
    <div style="display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; overflow-x: auto;">
      
      <button class="admin-tab-btn active" onclick="switchAdminTab('admins')" style="
        background: rgba(252,120,35,0.15);
        color: #fc7823;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-family: 'Tajawal', sans-serif;
        white-space: nowrap;
        transition: all 0.3s ease;
      ">
        <i class="fas fa-users" style="margin-left: 6px;"></i> إدارة الأدمنز
      </button>

      <button class="admin-tab-btn" onclick="switchAdminTab('analytics')" style="
        background: transparent;
        color: rgba(255,255,255,0.5);
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-family: 'Tajawal', sans-serif;
        white-space: nowrap;
        transition: all 0.3s ease;
      ">
        <i class="fas fa-chart-bar" style="margin-left: 6px;"></i> التحليلات
      </button>

      <button class="admin-tab-btn" onclick="switchAdminTab('content')" style="
        background: transparent;
        color: rgba(255,255,255,0.5);
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-family: 'Tajawal', sans-serif;
        white-space: nowrap;
        transition: all 0.3s ease;
      ">
        <i class="fas fa-file-pen" style="margin-left: 6px;"></i> المحتوى
      </button>

    </div>

    <!-- TAB 1: إدارة الأدمنز -->
    <div id="admins-tab" class="admin-tab-content" style="animation: fadeIn 0.4s ease;">
      <div id="admin-stats-container" style="margin-bottom: 24px;"></div>
      <div id="admins-list-container" style="margin-bottom: 24px;"></div>
    </div>

    <!-- TAB 2: التحليلات -->
    <div id="analytics-tab" class="admin-tab-content" style="display: none;">
      
      <!-- إحصائيات الطلبات -->
      <div style="margin-bottom: 32px;">
        <h3 style="color: #fc7823; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;">
          <i class="fas fa-layer-group"></i> إحصائيات الطلبات
        </h3>
        <div id="applications-stats" style="margin-bottom: 20px;"></div>
        <h4 style="color: rgba(255,255,255,0.7); margin: 16px 0 12px; font-size: 1rem;">رسم بياني الطلبات</h4>
        <div id="applications-chart" style="background: rgba(255,255,255,0.02); border-radius: 12px; padding: 20px;"></div>
      </div>

      <!-- أكثر الوظائف طلباً -->
      <div style="margin-bottom: 32px;">
        <h3 style="color: #fc7823; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;">
          <i class="fas fa-trophy"></i> أكثر الوظائف طلباً
        </h3>
        <div id="job-stats" style="margin-bottom: 20px;"></div>
        <h4 style="color: rgba(255,255,255,0.7); margin: 16px 0 12px; font-size: 1rem;">الرسم البياني</h4>
        <div id="jobs-chart" style="background: rgba(255,255,255,0.02); border-radius: 12px; padding: 20px;"></div>
      </div>

      <!-- إحصائيات اللاعبين -->
      <div style="margin-bottom: 32px;">
        <h3 style="color: #fc7823; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;">
          <i class="fas fa-users"></i> إحصائيات اللاعبين
        </h3>
        <div id="user-stats" style="margin-bottom: 20px;"></div>
        <h4 style="color: rgba(255,255,255,0.7); margin: 16px 0 12px; font-size: 1rem;">اللاعبون الجدد</h4>
        <div id="new-users-chart" style="background: rgba(255,255,255,0.02); border-radius: 12px; padding: 20px;"></div>
      </div>

      <!-- إحصائيات المتجر -->
      <div style="margin-bottom: 32px;">
        <h3 style="color: #fc7823; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;">
          <i class="fas fa-dollar-sign"></i> إحصائيات المتجر
        </h3>
        <div id="store-stats" style="margin-bottom: 20px;"></div>
        <h4 style="color: rgba(255,255,255,0.7); margin: 16px 0 12px; font-size: 1rem;">الإيرادات اليومية</h4>
        <div id="revenue-chart" style="background: rgba(255,255,255,0.02); border-radius: 12px; padding: 20px;"></div>
      </div>

    </div>

    <!-- TAB 3: إدارة المحتوى -->
    <div id="content-tab" class="admin-tab-content" style="display: none;">
      
      <!-- القوانين -->
      <div style="margin-bottom: 32px;">
        <div id="laws-manager-container"></div>
      </div>

      <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 32px 0;">

      <!-- الشروحات -->
      <div style="margin-bottom: 32px;">
        <div id="tutorials-manager-container"></div>
      </div>

      <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 32px 0;">

      <!-- متطلبات الوظائف -->
      <div style="margin-bottom: 32px;">
        <div id="jobs-requirements-container"></div>
      </div>

      <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 32px 0;">

      <!-- منتجات المتجر -->
      <div style="margin-bottom: 32px;">
        <div id="store-products-container"></div>
      </div>

    </div>

  </div>

</div>

<!-- ========================================
   CSS للتاب التنقل
   ======================================== -->
<style>
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .admin-tab-content {
    animation: fadeIn 0.4s ease;
  }

  .admin-tab-btn:hover {
    background: rgba(252, 120, 35, 0.1) !important;
    color: #fc7823 !important;
    transform: translateY(-2px);
  }

  .admin-tab-btn.active {
    background: rgba(252, 120, 35, 0.15) !important;
    color: #fc7823 !important;
  }
</style>

<!-- ========================================
   جافا سكريبت لتبديل التابات
   ======================================== -->
<script>
  function switchAdminTab(tabName) {
    // التحقق من الصلاحيات
    if (tabName === 'admins' && !canManageAdmins?.()) {
      showAdminNotification?.('❌ ليس لديك صلاحية إدارة الأدمنز', 'error');
      return;
    }
    
    if (tabName === 'analytics' && !canViewAnalytics?.()) {
      showAdminNotification?.('❌ ليس لديك صلاحية عرض التحليلات', 'error');
      return;
    }
    
    if (tabName === 'content' && !canManageContent?.()) {
      showAdminNotification?.('❌ ليس لديك صلاحية إدارة المحتوى', 'error');
      return;
    }

    // إخفاء جميع التابات
    document.querySelectorAll('.admin-tab-content').forEach(tab => {
      tab.style.display = 'none';
    });

    // إظهار التاب المختار
    const selectedTab = document.getElementById(tabName + '-tab');
    if (selectedTab) {
      selectedTab.style.display = 'block';
    }

    // تحديث زر التاب النشط
    document.querySelectorAll('.admin-tab-btn').forEach((btn, idx) => {
      const btnTabName = ['admins', 'analytics', 'content'][idx];
      if (btnTabName === tabName) {
        btn.style.background = 'rgba(252,120,35,0.15)';
        btn.style.color = '#fc7823';
        btn.classList.add('active');
      } else {
        btn.style.background = 'transparent';
        btn.style.color = 'rgba(255,255,255,0.5)';
        btn.classList.remove('active');
      }
    });
  }
</script>
